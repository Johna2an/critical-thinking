<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" font-family="Georgia,serif">
<rect width="1000" height="550" fill="#fbfaf7"/>
<rect x="0" y="0" width="1000" height="8" fill="#b4452f"/>
<text x="40" y="56" font-size="13" letter-spacing="2.5" fill="#b4452f" font-weight="700" font-family="Helvetica,Arial,sans-serif">FIVE BLIND-JUDGED ROUNDS</text>
<text x="40" y="92" font-size="27" fill="#1a1a1a" font-weight="700">The score held near 8 to 9. The field is what changed.</text>
<text x="40" y="118" font-size="15" fill="#6b6b6b" font-family="Helvetica,Arial,sans-serif">Ours' blind-judged score each round (bars scaled from 7 for contrast), with the competitor field it faced.</text>
<line x1="670" y1="136" x2="670" y2="466" stroke="#ece8e1"/><text x="670" y="130" text-anchor="middle" font-size="12" fill="#9a8f80" font-family="Helvetica,Arial,sans-serif">7</text><line x1="730" y1="136" x2="730" y2="466" stroke="#ece8e1"/><text x="730" y="130" text-anchor="middle" font-size="12" fill="#9a8f80" font-family="Helvetica,Arial,sans-serif">8</text><line x1="790" y1="136" x2="790" y2="466" stroke="#ece8e1"/><text x="790" y="130" text-anchor="middle" font-size="12" fill="#9a8f80" font-family="Helvetica,Arial,sans-serif">9</text><line x1="850" y1="136" x2="850" y2="466" stroke="#ece8e1"/><text x="850" y="130" text-anchor="middle" font-size="12" fill="#9a8f80" font-family="Helvetica,Arial,sans-serif">10</text><text x="234" y="170" text-anchor="end" font-size="15" fill="#1a1a1a" font-weight="700" font-family="Helvetica,Arial,sans-serif">Round 1 · Reasoning</text><text x="234" y="189" text-anchor="end" font-size="12" fill="#7a7167" font-family="Helvetica,Arial,sans-serif">vs baseline + GPT-5.5. First in 18/18 passes.</text><rect x="670" y="154" width="119.39999999999998" height="30" rx="4" fill="#2f7d4f" fill-opacity="0.9"/><text x="797.4" y="172" font-size="16" fill="#1a1a1a" font-weight="700" font-family="Helvetica,Arial,sans-serif">8.99</text><text x="234" y="236" text-anchor="end" font-size="15" fill="#1a1a1a" font-weight="700" font-family="Helvetica,Arial,sans-serif">Round 2 · Creativity</text><text x="234" y="255" text-anchor="end" font-size="12" fill="#7a7167" font-family="Helvetica,Arial,sans-serif">vs baseline + GPT-5.5. 11/18 picks; lost 2 briefs.</text><rect x="670" y="220" width="88.80000000000007" height="30" rx="4" fill="#2f7d4f" fill-opacity="0.9"/><text x="766.8000000000001" y="238" font-size="16" fill="#1a1a1a" font-weight="700" font-family="Helvetica,Arial,sans-serif">8.48</text><text x="234" y="302" text-anchor="end" font-size="15" fill="#1a1a1a" font-weight="700" font-family="Helvetica,Arial,sans-serif">Round 3 · v1 vs v2</text><text x="234" y="321" text-anchor="end" font-size="12" fill="#7a7167" font-family="Helvetica,Arial,sans-serif">v1 8.91 vs v2 8.87. A tie at the top.</text><rect x="670" y="286" width="112.19999999999993" height="30" rx="4" fill="#9a8f80" fill-opacity="0.9"/><text x="790.1999999999999" y="304" font-size="16" fill="#1a1a1a" font-weight="700" font-family="Helvetica,Arial,sans-serif">8.87</text><text x="234" y="368" text-anchor="end" font-size="15" fill="#1a1a1a" font-weight="700" font-family="Helvetica,Arial,sans-serif">Round 4 · vs rival skills</text><text x="234" y="387" text-anchor="end" font-size="12" fill="#7a7167" font-family="Helvetica,Arial,sans-serif">vs 2 rival skills + baseline. First on reasoning.</text><rect x="670" y="352" width="101.99999999999989" height="30" rx="4" fill="#2f7d4f" fill-opacity="0.9"/><text x="779.9999999999999" y="370" font-size="16" fill="#1a1a1a" font-weight="700" font-family="Helvetica,Arial,sans-serif">8.70</text><text x="234" y="434" text-anchor="end" font-size="15" fill="#1a1a1a" font-weight="700" font-family="Helvetica,Arial,sans-serif">Round 5 · full field + cost</text><text x="234" y="453" text-anchor="end" font-size="12" fill="#7a7167" font-family="Helvetica,Arial,sans-serif">vs 18 rivals incl. free prompts. #3 of 19, top-cluster near-tie.</text><rect x="670" y="418" width="61.799999999999955" height="30" rx="4" fill="#b4452f" fill-opacity="0.9"/><text x="739.8" y="436" font-size="16" fill="#1a1a1a" font-weight="700" font-family="Helvetica,Arial,sans-serif">8.03</text>
<text x="40" y="526" font-size="12" fill="#9a8f80" font-family="Helvetica,Arial,sans-serif">Green: ours placed first. Grey: a tie. Terracotta: top-cluster but not first (the field now includes other skills and free prompt techniques). n=1 per cell.</text>
</svg>