  <!-- footer note -->
  <text x="34" y="404" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" fill="#9aa3b2">Judges were Claude agents; family bias is an open limitation. Full transcripts, judge JSON, and caveats: docs/EVALS.md</text>
