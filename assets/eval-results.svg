    <text x="228" y="123" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2733">8.87</text>

    <text x="0" y="152" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" fill="#4b5563">Opus 4.8, no skill</text>
    <rect x="0" y="160" width="196" height="20" fill="#9aa3b2"/>
    <text x="202" y="175" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" fill="#4b5563">7.83</text>

    <text x="0" y="204" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" fill="#4b5563">GPT-5.5, xhigh</text>
    <rect x="0" y="212" width="183" height="20" fill="#b7aecf"/>
    <text x="189" y="227" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" fill="#4b5563">7.32</text>

    <line x1="0" y1="242" x2="0" y2="50" stroke="#d4d7dd" stroke-width="1"/>
    <text x="0" y="266" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" fill="#a16207">a tie at the top: 30 added books moved coverage, the mean held</text>
