    <text x="155" y="195" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" fill="#4b5563">5.96</text>

    <line x1="0" y1="210" x2="0" y2="50" stroke="#d4d7dd" stroke-width="1"/>
