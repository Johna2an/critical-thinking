  <!-- ===== Panel 3: Round 3 ===== -->
  <g transform="translate(766,108)">
    <text x="0" y="0" font-family="Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1f2733">Round 3 &#183; v1 vs v2</text>
    <text x="0" y="20" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" fill="#6b7280">8 problems &#183; 24 judge passes</text>

    <text x="0" y="48" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" fill="#1f2733">Skill v1 (21 books)</text>
